apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: first-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Jarom-W/Anima.git
    targetRevision: HEAD
    path: apps/first-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
