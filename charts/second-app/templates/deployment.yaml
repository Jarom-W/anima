apiVersion: apps/v1
kind: Deployment
metadata:
  name: second-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: second-app
  template:
    metadata:
      labels:
        app: second-app
    spec:
      containers:
        - name: second-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3000
