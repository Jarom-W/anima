name: Build and Push Image

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      #Get the code
      - name: Checkout
        uses: actions/checkout@v4

      #Set up Docker
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      #Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #Compute Git SHA
      - name: Get SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      #Build + Push Image
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/second-app/
          push: true
          tags: ghcr.io/jarom-w/anima-second-app:${{ steps.vars.outputs.sha }}

      - name: Update GitOps image tag
        run: | 
          sed -i "s/tag: .*/tag: ${{ steps.vars.outputs.sha }}/" charts/second-app/env/dev/values.yaml

      - name: Commit GitOps update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add charts/second-app/env/dev/values.yaml
          git commit -m "chore: promote image ${{ steps.vars.outputs.sha }}"
          git push
