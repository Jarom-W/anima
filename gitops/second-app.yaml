apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: second-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Jarom-W/Anima.git
    targetRevision: main
    path: charts/second-app

  destination:
    server: https://kubernetes.default.svc
    namespace: second-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
