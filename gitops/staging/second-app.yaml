apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: second-app-staging
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Jarom-W/Anima.git
    targetRevision: main
    path: charts/second-app
    helm:
      valueFiles:
        - env/staging/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
